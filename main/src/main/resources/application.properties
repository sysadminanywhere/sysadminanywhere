server.port = ${PORT:8080}
logging.level.org.atmosphere = warn
spring.mustache.check-template-location = false

info.version = @project.version@

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true

# PostgreSQL configuration.
spring.datasource.url = jdbc:postgresql://${DB_ADDRESS:localhost}:${DB_PORT:5432}/${DB_BASE:sysadminanywhere}
spring.datasource.username = ${DB_USER:postgres}
spring.datasource.password = ${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto = update

spring.liquibase.enabled = false

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages = com.vaadin,org.vaadin,com.flowingcode,com.sysadminanywhere,com.github.appreciated.apexcharts

app.services.directory.uri = ${DIRECTORY_SERVICE:http://localhost:8081}
app.services.inventory.uri = ${INVENTORY_SERVICE:http://localhost:8082}
app.services.incident.uri = ${INCIDENT_SERVICE:http://localhost:8083}

app.jwt.secret = ${JWT_SECRET:MySuperSecretKeyForJWTValidation123456}
# Disable default generated 'user' credentials from Spring Boot auto-configuration.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

n8n.url = ${N8N_HOST:http://localhost:5678}
n8n.api-key = ${N8N_API_KEY:}

# Login restriction settings
# Comma-separated list of allowed usernames (empty means all users allowed)
app.login.allowed-users=${ALLOWED_USERS:}
# Comma-separated list of allowed groups/roles (empty means all groups allowed)
app.login.allowed-groups=${ALLOWED_GROUPS:}

# AI Configuration
app.ai.enabled=${AI_ENABLED:false}
app.ai.base-url=${AI_BASE_URL:https://openrouter.ai/api/v1}
app.ai.api-key=${AI_API_KEY:}
app.ai.model=${AI_MODEL:google/gemma-3-27b-it:free}
app.ai.app-url=${AI_APP_URL:https://sysadminanywhere.local}
app.ai.app-name=${AI_APP_NAME:SysadminAnywhere}