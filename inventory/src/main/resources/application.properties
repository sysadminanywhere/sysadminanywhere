spring.application.name=inventory

server.port=${PORT:8082}

# PostgreSQL configuration.
spring.datasource.url = jdbc:postgresql://${DB_ADDRESS:localhost}:${DB_PORT:5432}/${DB_BASE:inventory}
spring.datasource.username = ${DB_USER:postgres}
spring.datasource.password = ${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto = update

spring.liquibase.enabled=false

cron.expression=${SCAN.CRON:0 0 0 * * *}

#LDAP ReadOnly User
ldap.host.username=${LDAP_USERNAME:}
ldap.host.password=${LDAP_PASSWORD:}

app.services.directory.uri=${DIRECTORY_SERVICE:http://localhost:8081}